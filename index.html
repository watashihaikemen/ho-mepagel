<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE | Official Site</title>
    <style>
        /* 基本スタイル */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        /* ヘッダー */
        header {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* コンテンツセクション */
        section {
            padding: 100px 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            padding-bottom: 15px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background-color: #333;
        }

        /* グリッドレイアウト（PC/スマホ対応） */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #000;
        }

        /* 画像付きセクション */
        .image-box {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        /* お問い合わせフォーム */
        .contact-form {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            background: #fafafa;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #333;
            background: #fff;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #000;
        }

        /* フッター */
        footer {
            background: #fff;
            padding: 50px 20px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.2rem; }
            section { padding: 60px 20px; }
            .image-box { height: 250px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hero-content">
            <h1>PERFECTION & LOGIC</h1>
            <p>思考と美学が交差する、唯一無二のプラットフォーム</p>
        </div>
    </header>

    <section id="about">
        <h2>コンセプト</h2>
        <div class="grid">
            <div class="card">
                <h3>論理的思考</h3>
                <p>妥協のない分析力と、徹底した論理性に基づいたアプローチ。すべての事象を構造的に捉え、最適解を導き出すことを信条としています。</p>
            </div>
            <div class="card">
                <h3>高精度の追求</h3>
                <p>細部へのこだわりが全体の説得力を生むと考え、視覚的な完成度と情報の正確性を両立させた表現を追求しています。</p>
            </div>
        </div>
    </section>

    <section id="visual">
        <h2>ビジュアル</h2>
        <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1000&q=80" alt="Core Visual" class="image-box">
        <p style="text-align: center; color: #666; font-size: 0.9rem;">「真理は細部に宿る」を体現する、洗練された空間構築。</p>
    </section>

    <section id="contact">
        <h2>お問い合わせ</h2>
        <form action="https://formspree.io/f/gsjsbavxhs@gmail.com" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">お名前</label>
                <input type="text" id="name" name="name" placeholder="例：山田 太郎" required>
            </div>
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="_replyto" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label for="message">メッセージ</label>
                <textarea id="message" name="message" rows="5" placeholder="ご用件を入力してください" required></textarea>
            </div>
            <input type="hidden" name="_subject" value="ホームページからのお問い合わせ">
            
            <button type="submit">送信する</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 THE ARCHIVE. All Rights Reserved.</p>
    </footer>

</body>
</html>
